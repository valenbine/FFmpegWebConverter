name: Build And Upload To Release (Manual)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to upload assets to (for example: v0.0.1)
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-upload:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout source
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        run: npm run build:desktop

      - name: Upload files to GitHub Release by tag
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          files: |
            release/*.exe
            release/*.blockmap
            release/latest*.yml
          fail_on_unmatched_files: true
